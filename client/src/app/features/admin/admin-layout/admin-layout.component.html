<div class="flex h-screen bg-gray-50 dark:bg-gray-950 transition-colors duration-300">
  <!-- Sidebar -->
  <aside class="w-64 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 flex flex-col z-50">
    <div class="h-16 border-b border-gray-100 dark:border-gray-800 flex items-center px-6">
      <div class="flex items-center space-x-3">
        <img src="media/siyana.png" alt="Siyana Logo" class="h-8 w-auto rounded-lg">
        <div>
          <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest leading-none">SIYENA</h2>
          <p class="text-sm font-extrabold text-gray-900 dark:text-white leading-tight">Panel Admin</p>
        </div>
      </div>
    </div>

    <nav class="flex-grow p-4 space-y-1 overflow-y-auto">
      <a routerLink="/admin/dashboard"
        routerLinkActive="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-bold"
        class="flex items-center px-4 py-3 text-sm font-medium text-gray-600 dark:text-gray-400 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-all group">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Dashboard
      </a>
      <a routerLink="/admin/users"
        routerLinkActive="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-bold"
        class="flex items-center px-4 py-3 text-sm font-medium text-gray-600 dark:text-gray-400 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-all group">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        Utilisateurs
      </a>
      <a routerLink="/admin/notifications"
        routerLinkActive="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-bold"
        class="flex items-center px-4 py-3 text-sm font-medium text-gray-600 dark:text-gray-400 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-all group">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
        </svg>
        <span class="flex-grow">Notifications</span>
        <span *ngIf="unreadCount() > 0"
          class="flex items-center justify-center h-5 min-w-[1.25rem] px-1.5 rounded-full bg-red-500 text-white text-[10px] font-bold shadow-sm animate-pulse">
          {{ unreadCount() > 99 ? '99+' : unreadCount() }}
        </span>
      </a>

      <!-- NEW LINKS -->
      <a routerLink="/admin/alerts"
        routerLinkActive="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-bold"
        class="flex items-center px-4 py-3 text-sm font-medium text-gray-600 dark:text-gray-400 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-all group">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        Alerts IA
      </a>
      <a routerLink="/admin/tickets"
        routerLinkActive="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-bold"
        class="flex items-center px-4 py-3 text-sm font-medium text-gray-600 dark:text-gray-400 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-all group">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
        Tickets
      </a>
      <!-- END NEW LINKS -->

      <a routerLink="/profile"
        class="flex items-center px-4 py-3 text-sm font-medium text-gray-600 dark:text-gray-400 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-all group">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        Profil
      </a>
    </nav>

    <div class="p-4 border-t border-gray-100 dark:border-gray-800">
      <button (click)="logout()"
        class="w-full flex items-center px-4 py-3 text-sm font-semibold text-red-600 dark:text-red-400 rounded-xl hover:bg-red-50 dark:hover:bg-red-900/20 transition-all">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        Déconnexion
      </button>
    </div>
  </aside>

  <main class="flex-grow flex flex-col overflow-hidden">
    <header
      class="h-16 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 flex items-center justify-between px-8">
      <div></div> <!-- Spacer -->
      <div class="flex items-center space-x-6">
        <!-- Theme Toggle -->
        <button (click)="themeService.toggleTheme()"
          class="p-2 rounded-full text-gray-500 dark:text-gray-300 hover:bg-gray-100/20 dark:hover:bg-gray-700/20 focus:outline-none transition-colors">
          <i *ngIf="!themeService.darkMode()" class="fas fa-moon text-xl text-indigo-400"></i>
          <i *ngIf="themeService.darkMode()" class="fas fa-sun text-xl text-yellow-400"></i>
        </button>

        <div class="flex items-center space-x-4">
          <div class="text-right hidden md:block">
            <p class="text-sm font-bold text-gray-900 dark:text-white">{{ user()?.nom }}</p>
            <p class="text-xs text-indigo-600 font-medium tracking-tight">Administrateur Système</p>
          </div>
          <img src="/media/admin.png" alt="Admin Avatar"
            class="h-10 w-10 rounded-full border-2 border-white dark:border-gray-800 shadow-sm object-cover">
        </div>
      </div>
    </header>
    <div class="flex-grow p-8 overflow-y-auto bg-gray-50 dark:bg-gray-950">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
