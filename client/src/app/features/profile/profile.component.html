<div class="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors duration-300 pt-24 pb-12">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center space-x-4 mb-8">
      <a [routerLink]="user()?.role === 'admin' ? '/admin/dashboard' : (user()?.role === 'employee' ? '/employee/chat' : '/dashboard')"
        class="flex items-center text-sm font-medium text-indigo-600 dark:text-indigo-400 hover:underline">
        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Retour au tableau de bord
      </a>
    </div>

    <div
      class="bg-white dark:bg-gray-800 shadow-xl rounded-2xl overflow-hidden border border-gray-100 dark:border-gray-700">
      <!-- Header Background -->
      <div class="h-32 bg-indigo-600"></div>

      <div class="px-8 pb-10">
        <!-- Avatar -->
        <div class="relative -mt-16 mb-6">
          <div
            class="inline-flex items-center justify-center h-32 w-32 rounded-2xl bg-white dark:bg-gray-750 shadow-lg border-4 border-white dark:border-gray-800 text-3xl font-bold text-indigo-600 dark:text-indigo-400 overflow-hidden">
            <ng-container *ngIf="user()?.role === 'admin'">
              <img src="/media/admin.png" alt="Admin Avatar" class="h-full w-full object-cover">
            </ng-container>
            <ng-container *ngIf="user()?.role === 'employee'">
              <img src="/media/employé.png" alt="Employé Avatar" class="h-full w-full object-cover">
            </ng-container>
            <ng-container *ngIf="user()?.role === 'technician'">
              <img src="/media/technicien.png" alt="Technicien Avatar" class="h-full w-full object-cover">
            </ng-container>
          </div>
        </div>

        <div class="flex justify-between items-start mb-10">
          <div>
            <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white">{{ user()?.nom }}</h1>
            <p class="text-indigo-600 dark:text-indigo-400 font-medium">
              {{ user()?.role === 'admin' ? 'Administrateur Système' : (user()?.role === 'employee' ? 'Employé' :
              'Technicien') }}
            </p>
          </div>
          <span
            class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400">
            Compte Actif
          </span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <!-- Information Group -->
          <div class="space-y-6">
            <div>
              <label class="block text-xs font-bold text-gray-500 dark:text-gray-500 uppercase tracking-wider mb-1">Nom
                Complet</label>
              <p class="text-lg font-medium text-gray-900 dark:text-gray-100">{{ user()?.nom }}</p>
            </div>
            <div>
              <label
                class="block text-xs font-bold text-gray-500 dark:text-gray-500 uppercase tracking-wider mb-1">Adresse
                Email</label>
              <p class="text-lg font-medium text-gray-900 dark:text-gray-100">{{ user()?.email }}</p>
            </div>
          </div>

        </div>

      </div>
    </div>
  </div>
</div>
